{% extends "base.html" %}
{% block title %}Inventory | Alimento{% endblock %}
{% block content %}
<div class="max-w-[1280px] mx-auto px-2 sm:px-4 lg:px-6 space-y-5 sm:space-y-6">

    <!-- Header -->
    <section class="card p-4 sm:p-6">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <h1 class="text-2xl sm:text-3xl font-semibold font-display">Smart Inventory</h1>
                <p class="text-sm text-muted mt-1">Track pantry, fridge, and freezer items with low-stock and expiring alerts.</p>
            </div>
            <div id="inventorySummary" class="text-xs sm:text-sm text-muted"></div>
        </div>
    </section>

    <!-- Add Item -->
    <section class="card p-4 sm:p-6">
        <h2 class="font-semibold mb-3 text-text">Add Item</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
            <input id="invName" class="input" placeholder="Item name">
            <select id="invLocation" class="input">
                <option value="pantry">Pantry</option>
                <option value="fridge">Fridge</option>
                <option value="freezer">Freezer</option>
            </select>
            <input id="invCategory" class="input" placeholder="Category (e.g. dairy)">
            <input id="invExpiry" type="date" class="input">
            <input id="invQty" type="number" step="0.1" class="input" placeholder="Quantity">
            <input id="invUnit" class="input" placeholder="Unit (pcs, g, ml)">
            <input id="invThreshold" type="number" step="0.1" class="input" placeholder="Low stock threshold">
            <button id="addItemBtn" class="btn btn-primary font-semibold">Add</button>
        </div>
        <p id="inventoryStatus" class="text-xs mt-2 text-muted"></p>
    </section>

    <!-- Inventory List -->
    <section class="card p-4 sm:p-6">
        <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between mb-4">
            <h2 class="font-semibold text-text">Inventory List</h2>
            <div class="flex flex-wrap items-center gap-2">
                <label class="flex items-center gap-1.5 text-xs text-muted cursor-pointer select-none">
                    <input type="checkbox" id="invSelectAll" class="rounded border-border">
                    <span>Select all</span>
                </label>
                <button type="button" id="bulkDeleteInventoryBtn" class="btn btn-ghost text-xs px-3 py-1.5 text-danger border border-danger/30" disabled>Delete selected</button>
                <button id="refreshInventoryBtn" class="btn btn-secondary text-sm px-3 py-1.5">Refresh</button>
            </div>
        </div>
        <div id="inventoryList" class="space-y-2"></div>
    </section>

    <!-- AI Suggestions -->
    <section class="card p-4 sm:p-6">
        <div class="flex flex-col gap-2 sm:flex-row sm:items-start sm:justify-between mb-4">
            <div class="min-w-0">
                <h2 class="font-semibold text-text">AI Meal Suggestions (from inventory)</h2>
                <p id="suggestionsMeta" class="text-xs text-muted mt-1 min-h-[1.25rem]"></p>
            </div>
            <div class="flex flex-wrap items-center gap-2 shrink-0">
                <button type="button" id="suggestBtn" class="btn btn-primary text-sm px-3 py-1.5">Generate</button>
            </div>
        </div>
        <div id="suggestions" class="space-y-2 text-sm"></div>
    </section>
</div>

<script>
    function esc(s) { return String(s || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }

    function statusBadgeClass(status) {
        if (status === 'low_stock') return 'pill pill-warn';
        if (status === 'expiring') return 'pill pill-danger';
        return 'pill pill-success';
    }

    function setStatus(msg, ok) {
        const el = document.getElementById('inventoryStatus');
        el.className = `text-xs mt-2 ${ok ? 'text-success' : 'text-danger'}`;
        el.textContent = msg;
    }

    function row(item) {
        const expiry = item.expires_at ? new Date(item.expires_at).toLocaleDateString() : '-';
        const qty = `${Number(item.quantity || 0)} ${item.unit || ''}`.trim();
        const badge = item.status === 'expiring' ? `Expiring (${item.days_to_expiry ?? '?'}d)` : (item.status === 'low_stock' ? 'Low stock' : 'OK');
        return `
            <div class="bg-surface2 rounded-xl p-3 flex items-start justify-between gap-3 border border-border">
                <label class="flex items-start gap-2 min-w-0 cursor-pointer select-none">
                    <input type="checkbox" class="inv-select mt-1 rounded border-border flex-shrink-0" data-inv-id="${esc(item._id)}" aria-label="Select ${esc(item.name)}">
                    <div class="min-w-0">
                        <div class="font-semibold text-text">${esc(item.name)}</div>
                        <div class="text-xs text-muted">${esc(item.location)} | ${esc(item.category || 'uncategorized')} | Qty: ${esc(qty)} | Exp: ${esc(expiry)}</div>
                    </div>
                </label>
                <div class="flex items-center gap-2 flex-shrink-0">
                    <span class="${statusBadgeClass(item.status)}">${esc(badge)}</span>
                    <button type="button" class="btn btn-ghost text-xs px-2 py-1 text-danger hover:bg-danger/10" onclick="deleteItem('${esc(item._id)}')">Delete</button>
                </div>
            </div>`;
    }

    async function loadInventory() {
        const res = await fetch('/api/v3/inventory');
        const data = await res.json();
        if (!data.success) {
            setStatus(data.message || data.error || 'Could not load inventory.', false);
            return;
        }
        document.getElementById('inventoryList').innerHTML = (data.items || []).map(row).join('') || '<p class="text-sm text-muted">No inventory items yet.</p>';
        const s = data.summary || {};
        document.getElementById('inventorySummary').textContent = `Items: ${s.count || 0} | Low stock: ${s.low_stock || 0} | Expiring: ${s.expiring || 0}`;
        syncInvBulkUI();
    }

    function syncInvBulkUI() {
        const list = document.getElementById('inventoryList');
        const checks = list.querySelectorAll('.inv-select');
        const n = list.querySelectorAll('.inv-select:checked').length;
        const btn = document.getElementById('bulkDeleteInventoryBtn');
        const sa = document.getElementById('invSelectAll');
        if (btn) btn.disabled = n === 0;
        if (sa && checks.length) {
            sa.checked = n === checks.length && n > 0;
            sa.indeterminate = n > 0 && n < checks.length;
        } else if (sa) {
            sa.checked = false;
            sa.indeterminate = false;
        }
    }

    async function bulkDeleteInventory() {
        const ids = Array.from(document.querySelectorAll('.inv-select:checked')).map((cb) => cb.getAttribute('data-inv-id')).filter(Boolean);
        if (!ids.length) return;
        if (!confirm(`Delete ${ids.length} item${ids.length === 1 ? '' : 's'}?`)) return;
        const res = await fetch('/api/v3/inventory/bulk-delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids })
        });
        const data = await res.json().catch(() => ({}));
        if (!data.success) {
            setStatus(data.message || data.error || 'Could not delete items.', false);
            return;
        }
        setStatus(`Deleted ${data.deleted || 0} item(s).`, true);
        loadInventory();
    }

    async function addItem() {
        const body = {
            name: document.getElementById('invName').value.trim(),
            location: document.getElementById('invLocation').value,
            category: document.getElementById('invCategory').value.trim(),
            expires_at: document.getElementById('invExpiry').value || null,
            quantity: Number(document.getElementById('invQty').value || 0),
            unit: document.getElementById('invUnit').value.trim() || 'pcs',
            low_stock_threshold: Number(document.getElementById('invThreshold').value || 1)
        };
        const res = await fetch('/api/v3/inventory', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!data.success) {
            setStatus(data.message || data.error || 'Could not add item.', false);
            return;
        }
        setStatus('Item added.', true);
        loadInventory();
    }

    async function deleteItem(id) {
        const res = await fetch(`/api/v3/inventory/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (!data.success) {
            setStatus(data.message || data.error || 'Could not delete item.', false);
            return;
        }
        loadInventory();
    }

    function setSuggestionsMeta(msg, tone) {
        const el = document.getElementById('suggestionsMeta');
        if (!msg) {
            el.textContent = '';
            el.className = 'text-xs text-muted mt-1 min-h-[1.25rem]';
            return;
        }
        let cls = 'text-muted';
        if (tone === 'ok') cls = 'text-success';
        if (tone === 'err') cls = 'text-danger';
        el.className = `text-xs mt-1 min-h-[1.25rem] ${cls}`;
        el.textContent = msg;
    }

    function renderSuggestions(meals) {
        const container = document.getElementById('suggestions');
        const list = Array.isArray(meals) ? meals : [];
        container.innerHTML = list.map(m => `
            <div class="bg-surface2 rounded-xl p-3 border border-border">
                <div class="font-semibold text-text">${esc(m.name)}</div>
                <p class="text-xs text-muted mt-1">${esc(m.why || '')}</p>
                <p class="text-xs text-muted mt-1">Uses: ${esc((m.uses || []).join(', '))}</p>
                <p class="text-xs text-muted mt-1">${esc(m.nutrition_note || '')}</p>
            </div>
        `).join('') || '<p class="text-sm text-muted">No suggestions to show.</p>';
    }

    async function loadSavedSuggestions() {
        try {
            const res = await fetch('/api/v3/inventory/suggestions/saved');
            const data = await res.json();
            if (!data.success) return;
            const meals = data.meals || [];
            if (!meals.length) {
                setSuggestionsMeta('');
                return;
            }
            renderSuggestions(meals);
            const when = data.updated_at ? new Date(data.updated_at).toLocaleString() : '';
            setSuggestionsMeta(when ? `Showing saved suggestions (${when}).` : 'Showing saved suggestions.', 'info');
        } catch (e) {
            /* ignore */
        }
    }

    async function suggestMeals() {
        const container = document.getElementById('suggestions');
        container.innerHTML = '';
        setSuggestionsMeta('');
        const res = await fetch('/api/v3/inventory/suggestions', { method: 'POST' });
        let data = {};
        try {
            data = await res.json();
        } catch (e) {
            container.innerHTML = `<p class="text-sm text-danger">Could not read server response (${res.status}).</p>`;
            return;
        }
        if (!data.success) {
            container.innerHTML = `<p class="text-sm text-danger">${esc(data.message || data.error || 'Could not generate suggestions.')}</p>`;
            return;
        }
        const meals = data.meals || [];
        renderSuggestions(meals);
        if (data.saved) {
            setSuggestionsMeta('Saved to your account automatically. Open Inventory anytime to see this list.', 'ok');
        } else {
            setSuggestionsMeta('Nothing valid to save — try generating again.', 'err');
        }
    }

    const addItemBtn = document.getElementById('addItemBtn');
    const refreshInventoryBtn = document.getElementById('refreshInventoryBtn');
    const suggestBtn = document.getElementById('suggestBtn');
    const invSelectAll = document.getElementById('invSelectAll');
    const bulkDeleteInventoryBtn = document.getElementById('bulkDeleteInventoryBtn');
    addItemBtn.addEventListener('click', () => withCtaLoading(addItemBtn, addItem, { label: 'Adding…' }));
    refreshInventoryBtn.addEventListener('click', () => withCtaLoading(refreshInventoryBtn, loadInventory, { label: 'Refreshing…' }));
    suggestBtn.addEventListener('click', () => withCtaLoading(suggestBtn, suggestMeals, { label: 'Generating…' }));
    invSelectAll.addEventListener('change', (e) => {
        document.querySelectorAll('.inv-select').forEach((cb) => { cb.checked = e.target.checked; });
        syncInvBulkUI();
    });
    document.getElementById('inventoryList').addEventListener('change', (e) => {
        if (e.target.classList && e.target.classList.contains('inv-select')) syncInvBulkUI();
    });
    bulkDeleteInventoryBtn.addEventListener('click', () => withCtaLoading(bulkDeleteInventoryBtn, bulkDeleteInventory, { label: 'Deleting…' }));
    (async () => {
        await fetch('/api/me', { credentials: 'same-origin' }).catch(() => {});
        await loadInventory();
        await loadSavedSuggestions();
    })();
</script>
{% endblock %}
