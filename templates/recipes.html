{% extends "base.html" %}

{% block title %}Recipes - Alimento{% endblock %}

{% block content %}
<div class="max-w-[1280px] mx-auto px-2 sm:px-4 lg:px-6 space-y-5 sm:space-y-8">
    <!-- Header -->
    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-3 sm:gap-4">
        <div>
            <h1 class="text-2xl sm:text-3xl font-semibold text-text font-display">Recipe Library</h1>
            <p class="text-sm sm:text-base text-muted">Create diet-aware recipes and add them to your planner.</p>
        </div>
    </div>

    <div id="recipeContextBanner" class="card p-4 text-sm text-muted">Loading profile context...</div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
        <!-- Add Recipe Form -->
        <div class="card p-4 sm:p-6 lg:col-span-1 lg:sticky lg:top-24 h-fit">
            <h2 class="text-lg font-semibold mb-4 text-text">Add Recipe</h2>
            <div class="space-y-3">
                <input id="recipeName" class="input" placeholder="Recipe name">
                <textarea id="recipeDesc" rows="3" class="input resize-none" placeholder="Description"></textarea>
                <input id="recipeDietTags" class="input" placeholder="Diet tags (comma separated)">
                <input id="recipeIngredients" class="input" placeholder="Ingredients (comma separated)">
                <input id="recipeSteps" class="input" placeholder="Steps (semicolon separated)">
                <input id="recipeServings" class="input" placeholder="Servings (e.g. 2)">
                <div class="grid grid-cols-2 gap-2">
                    <input id="recipeCookTime" class="input" placeholder="Cook time min">
                    <input id="recipeCost" class="input" placeholder="Cost / serving $">
                    <input id="recipeCalories" class="input" placeholder="Calories">
                    <input id="recipeProtein" class="input" placeholder="Protein g">
                    <input id="recipeCarbs" class="input" placeholder="Carbs g">
                    <input id="recipeFat" class="input" placeholder="Fat g">
                </div>
                <label class="flex items-center gap-2 text-sm text-muted cursor-pointer">
                    <input type="checkbox" id="recipePublic" class="rounded border-border">
                    <span>Make public</span>
                </label>
                <button id="addRecipe" class="btn btn-primary w-full py-2 font-semibold text-sm">Save Recipe</button>
                <p id="recipeStatus" class="text-xs text-muted"></p>
            </div>
        </div>

        <!-- Recipe Grid -->
        <div class="lg:col-span-2 card p-4 sm:p-6">
            <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between mb-4">
                <h2 class="text-lg font-semibold text-text">My + Public Recipes</h2>
                <div class="flex flex-wrap items-center gap-2">
                    <label class="flex items-center gap-1.5 text-xs text-muted cursor-pointer select-none">
                        <input type="checkbox" id="recipeSelectAllMine" class="rounded border-border">
                        <span>Select my recipes</span>
                    </label>
                    <button type="button" id="bulkDeleteRecipesBtn" class="btn btn-ghost text-xs px-3 py-1.5 text-danger border border-danger/30" disabled>Delete selected</button>
                    <button id="refreshRecipes" class="btn btn-secondary text-sm px-3 py-1.5">Refresh</button>
                </div>
            </div>
            <div id="recipeGrid" class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const RECIPE_OWNER_ID = '{{ current_user.id if current_user.is_authenticated else "" }}';

    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function setRecipeStatus(msg, ok = true) {
        const el = document.getElementById('recipeStatus');
        el.textContent = msg;
        el.className = `text-xs ${ok ? 'text-brand' : 'text-danger'}`;
    }

    function recipeCard(recipe) {
        const nutrition = recipe.nutrition || {};
        const tags = (recipe.diet_tags || []).slice(0, 4).map(t => `<span class="pill pill-brand text-[11px]">${escapeHtml(t)}</span>`).join('');
        const extraTags = (recipe.diet_tags || []).length > 4 ? `<span class="pill pill-neutral text-[11px]">+${(recipe.diet_tags || []).length - 4}</span>` : '';
        const ingredients = (recipe.ingredients || []).slice(0, 4).map(i => `<span class="pill pill-neutral text-[11px]">${escapeHtml(i)}</span>`).join('');
        const extraIngredients = (recipe.ingredients || []).length > 4 ? `<span class="pill pill-neutral text-[11px]">+${(recipe.ingredients || []).length - 4} more</span>` : '';
        const isMine = recipe.user_id === RECIPE_OWNER_ID;
        const ownerBadge = isMine
            ? '<span class="pill pill-success text-[11px]"><i class="ph ph-user"></i> Mine</span>'
            : '<span class="pill pill-neutral text-[11px]"><i class="ph ph-globe-hemisphere-west"></i> Public</span>';
        const rid = escapeHtml(recipe._id || '');
        const selectMine = isMine
            ? `<input type="checkbox" class="recipe-select mt-1 rounded border-border flex-shrink-0" data-recipe-id="${rid}" title="Select for bulk delete" aria-label="Select recipe">`
            : '';

        return `
            <div class="border border-border rounded-2xl p-4 bg-surface h-full flex flex-col">
                <div class="flex items-start justify-between gap-2">
                    <div class="flex items-start gap-2 min-w-0 flex-1">
                        ${selectMine}
                        <div class="min-w-0">
                            <h3 class="font-bold text-text text-lg leading-tight truncate">${escapeHtml(recipe.name || 'Untitled')}</h3>
                            <div class="mt-1">${ownerBadge}</div>
                        </div>
                    </div>
                    ${isMine ? `<button type="button" onclick="deleteRecipe('${rid}')" class="btn btn-ghost btn-icon text-danger hover:bg-danger/10 flex-shrink-0" title="Delete recipe"><i class='ph ph-trash'></i></button>` : ''}
                </div>
                <p class="text-sm text-muted mt-2 line-clamp-2">${escapeHtml(recipe.description || '')}</p>

                <div class="mt-3 flex flex-wrap gap-1.5">${tags}${extraTags || ''}</div>

                <div class="mt-3 grid grid-cols-2 gap-2 text-xs">
                    <div class="flex items-center gap-1 text-muted"><i class="ph ph-fire text-warn"></i><span class="tabular">${Math.round(nutrition.calories_kcal || 0)} kcal</span></div>
                    <div class="flex items-center gap-1 text-muted"><i class="ph ph-bowl-food text-success"></i><span class="tabular">${Math.round(nutrition.protein_g || 0)}g protein</span></div>
                    <div class="flex items-center gap-1 text-muted"><i class="ph ph-grains text-warn"></i><span class="tabular">${Math.round(nutrition.carbs_g || 0)}g carbs</span></div>
                    <div class="flex items-center gap-1 text-muted"><i class="ph ph-drop text-rose"></i><span class="tabular">${Math.round(nutrition.fat_g || 0)}g fat</span></div>
                    <div class="flex items-center gap-1 text-muted"><i class="ph ph-users-three text-muted"></i><span>${recipe.servings || 1} servings</span></div>
                    <div class="flex items-center gap-1 text-muted"><i class="ph ph-timer text-muted"></i><span>${recipe.cook_time_min || 0} min</span></div>
                    <div class="col-span-2 flex items-center gap-1 text-muted"><i class="ph ph-currency-dollar text-muted"></i><span>$${Number(recipe.cost_per_serving || 0).toFixed(2)} per serving</span></div>
                </div>

                <div class="mt-auto pt-3 border-t border-border">
                    <p class="label-tiny mb-1">Top Ingredients</p>
                    <div class="flex flex-wrap gap-1.5">${ingredients || '<span class="pill pill-neutral text-[11px]">No ingredients</span>'}${extraIngredients || ''}</div>
                </div>
            </div>
        `;
    }

    async function loadContextBanner() {
        const el = document.getElementById('recipeContextBanner');
        const res = await fetch('/api/v3/context');
        const data = await res.json();
        if (!data.success) {
            el.textContent = 'Could not load profile context.';
            return;
        }
        const missing = data.missing || [];
        if (!missing.length) {
            el.innerHTML = `<strong class="text-brand">Recipe personalization active.</strong> Filtering uses your diet, allergies, restrictions, prep time, and budget.`;
        } else {
            el.innerHTML = `<strong class="text-warn">Personalization partial.</strong> Missing profile fields: ${missing.join(', ')}.`;
        }
    }

    function syncRecipeBulkUI() {
        const grid = document.getElementById('recipeGrid');
        const checks = grid.querySelectorAll('.recipe-select');
        const n = grid.querySelectorAll('.recipe-select:checked').length;
        const btn = document.getElementById('bulkDeleteRecipesBtn');
        const sa = document.getElementById('recipeSelectAllMine');
        if (btn) btn.disabled = n === 0;
        if (sa && checks.length) {
            sa.checked = n === checks.length && n > 0;
            sa.indeterminate = n > 0 && n < checks.length;
        } else if (sa) {
            sa.checked = false;
            sa.indeterminate = false;
        }
    }

    async function bulkDeleteRecipes() {
        const ids = Array.from(document.querySelectorAll('.recipe-select:checked')).map((cb) => cb.getAttribute('data-recipe-id')).filter(Boolean);
        if (!ids.length) return;
        if (!confirm(`Permanently delete ${ids.length} recipe${ids.length === 1 ? '' : 's'}?`)) return;
        const res = await fetch('/api/v3/recipes/bulk-delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids })
        });
        const data = await res.json().catch(() => ({}));
        if (!data.success) {
            setRecipeStatus(data.message || data.error || 'Bulk delete failed.', false);
            return;
        }
        setRecipeStatus(`Deleted ${data.deleted || 0} recipe(s).`, true);
        loadRecipes();
    }

    async function loadRecipes() {
        const res = await fetch('/api/v3/recipes?include_public=1');
        const data = await res.json();
        if (!data.success) return;
        const grid = document.getElementById('recipeGrid');
        if (!data.recipes.length) {
            grid.innerHTML = '<p class="text-sm text-muted">No recipes yet.</p>';
            syncRecipeBulkUI();
            return;
        }
        grid.innerHTML = data.recipes.map(recipeCard).join('');
        syncRecipeBulkUI();
    }

    async function addRecipe() {
        const payload = {
            name: document.getElementById('recipeName').value,
            description: document.getElementById('recipeDesc').value,
            diet_tags: document.getElementById('recipeDietTags').value.split(',').map(x => x.trim()).filter(Boolean),
            ingredients: document.getElementById('recipeIngredients').value.split(',').map(x => x.trim()).filter(Boolean),
            steps: document.getElementById('recipeSteps').value.split(';').map(x => x.trim()).filter(Boolean),
            servings: Math.max(1, Number(document.getElementById('recipeServings').value || 1)),
            cook_time_min: Number(document.getElementById('recipeCookTime').value || 20),
            cost_per_serving: Number(document.getElementById('recipeCost').value || 0),
            nutrition: {
                calories_kcal: Number(document.getElementById('recipeCalories').value || 0),
                protein_g: Number(document.getElementById('recipeProtein').value || 0),
                carbs_g: Number(document.getElementById('recipeCarbs').value || 0),
                fat_g: Number(document.getElementById('recipeFat').value || 0),
            },
            is_public: document.getElementById('recipePublic').checked,
        };
        const res = await fetch('/api/v3/recipes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
            setRecipeStatus('Recipe saved.', true);
            loadRecipes();
        } else {
            setRecipeStatus(data.message || data.error || 'Save failed.', false);
        }
    }

    async function deleteRecipe(id) {
        const res = await fetch(`/api/v3/recipes/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) loadRecipes();
    }

    document.addEventListener('DOMContentLoaded', () => {
        const addRecipeBtn = document.getElementById('addRecipe');
        const refreshRecipesBtn = document.getElementById('refreshRecipes');
        const bulkDeleteRecipesBtn = document.getElementById('bulkDeleteRecipesBtn');
        const recipeSelectAllMine = document.getElementById('recipeSelectAllMine');
        addRecipeBtn.addEventListener('click', () => withCtaLoading(addRecipeBtn, addRecipe, { label: 'Saving…' }));
        refreshRecipesBtn.addEventListener('click', () => withCtaLoading(refreshRecipesBtn, loadRecipes, { label: 'Refreshing…' }));
        bulkDeleteRecipesBtn.addEventListener('click', () => withCtaLoading(bulkDeleteRecipesBtn, bulkDeleteRecipes, { label: 'Deleting…' }));
        recipeSelectAllMine.addEventListener('change', (e) => {
            document.querySelectorAll('.recipe-select').forEach((cb) => { cb.checked = e.target.checked; });
            syncRecipeBulkUI();
        });
        document.getElementById('recipeGrid').addEventListener('change', (e) => {
            if (e.target.classList && e.target.classList.contains('recipe-select')) syncRecipeBulkUI();
        });
        loadContextBanner();
        loadRecipes();
    });
</script>
{% endblock %}
